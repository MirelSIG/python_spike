<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Spike - Equipo D</title>
    <link rel="stylesheet" href="Navbar/index.css">
    <style>
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            text-align: center;
            padding: 2rem;
        }
        .hero h1 {
            font-size: 5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInDown 1s ease-out;
        }
        .hero p {
            font-size: 1.3rem;
            color: #cbd5e1;
            max-width: 600px;
            line-height: 1.7;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        .cards-grid {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 1s ease-out 0.6s both;
        }
        .member-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem 2.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-decoration: none;
            color: #f8fafc;
            min-width: 200px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .member-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.25);
        }
        .member-card .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }
        .member-card h2 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
        }
        .member-card span.topic {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .card-mirel  { border-top: 3px solid #10b981; }
        .card-mirel:hover  { box-shadow: 0 30px 60px rgba(16, 185, 129, 0.2); }
        .card-luis   { border-top: 3px solid #3b82f6; }
        .card-luis:hover   { box-shadow: 0 30px 60px rgba(59, 130, 246, 0.2); }
        .card-juan   { border-top: 3px solid #f59e0b; }
        .card-juan:hover   { box-shadow: 0 30px 60px rgba(245, 158, 11, 0.2); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-buttons">
            <a class="nav-button" href="MirelPY/index.html">Mirel</a>
            <a class="nav-button" href="LuisPY/index.html">Luis</a>
            <a class="nav-button" href="JuanCarlosPY/index.html">Juan Carlos</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Python Spike</h1>
        <p>Exploración interactiva de Python en el navegador. Selecciona un integrante del equipo para ver sus ejemplos y ejecutar código en tiempo real.</p>

        <div class="cards-grid">
            <a class="member-card card-mirel" href="MirelPY/index.html">
                <span class="emoji">📝</span>
                <h2>Mirel</h2>
                <span class="topic">Strings &amp; Listas</span>
            </a>
            <a class="member-card card-luis" href="LuisPY/index.html">
                <span class="emoji">🧩</span>
                <h2>Luis</h2>
                <span class="topic">Objetos (POO)</span>
            </a>
            <a class="member-card card-juan" href="JuanCarlosPY/index.html">
                <span class="emoji">📚</span>
                <h2>Juan Carlos</h2>
                <span class="topic">Diccionarios</span>
            </a>
        </div>
    </div>
</body>
</html>
